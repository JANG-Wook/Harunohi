# Harunohi 백엔드 애플리케이션 설정 (데이터소스는 환경변수 기반, 비밀번호는 커밋 금지).
spring:
  application:
    name: harunohi-backend
  datasource:
    # 로컬 개발 편의를 위해 URL/사용자명에만 기본값을 둔다. 비밀번호는 기본값 없이 환경변수로만 주입한다.
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/harunohi?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:harunohi}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Flyway 가 스키마를 소유한다. JPA 는 검증만 수행하고 스키마를 생성/변경하지 않는다.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

security:
  jwt:
    # HS256 서명 비밀은 환경변수 전용이며 기본값이 없다. 미설정 시 앱이 기동되지 않는다 (fail fast).
    secret: ${JWT_SECRET}
    # 액세스 토큰 만료(분). 파일럿은 access token 만 사용한다 (refresh 없음).
    access-exp-min: ${JWT_ACCESS_EXP_MIN:120}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
